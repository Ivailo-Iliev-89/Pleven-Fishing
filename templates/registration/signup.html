{% extends 'base.html' %}
{% block content %}

<div class="auth-container signup-box">
    <h2>Become a part of GeoAngler</h2>
    <p>Register for share your fish catch with other fishers!</p>
    
    <form method="post" class="fishing-form">
        {% csrf_token %}
        <div class="form-fields">
            {{ form.as_p }}
        </div>
        <button type="submit" class="auth-submit-btn">Create a profile</button>
    </form>
    
    <div class="auth-footer">
        <p>You have profile already ? <a href="{% url 'login' %}">Login here</a></p>
    </div>
</div>
{% endblock %}
